<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GeoWisata Sabu-Raijua Explorer - Ekspedisi 2024</title>

  <!-- DEPENDENCIES: Leaflet & Google Fonts -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      --accent:       #00e5b0;
      --accent-2:     #ff6b35;
      --accent-3:     #a78bfa;
      --glass-bg:     rgba(8, 12, 20, 0.72);
      --glass-border: rgba(0, 229, 176, 0.18);
      --glass-blur:   blur(18px);
      --surface:      rgba(15, 22, 35, 0.85);
      --text-primary: #e8f4f0;
      --text-muted:   #7a9a90;
      --sidebar-w:    340px;
      --radius:       14px;
      --font-display: 'Syne', sans-serif;
      --font-mono:    'Space Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-mono);
      background: #060b14;
      color: var(--text-primary);
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    #map {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .leaflet-control-attribution {
      background: var(--glass-bg) !important;
      color: var(--text-muted) !important;
      font-family: var(--font-mono) !important;
      font-size: 9px !important;
      backdrop-filter: var(--glass-blur) !important;
      border-radius: 6px 0 0 0 !important;
    }
    .leaflet-control-attribution a { color: var(--accent) !important; }

    .leaflet-control-zoom {
      border: none !important;
      overflow: hidden;
      border-radius: 10px !important;
    }
    .leaflet-control-zoom a {
      background: var(--glass-bg) !important;
      color: var(--accent) !important;
      border: 1px solid var(--glass-border) !important;
      font-size: 18px !important;
      backdrop-filter: var(--glass-blur) !important;
      transition: background 0.2s;
    }
    .leaflet-control-zoom a:hover { background: var(--surface) !important; }

    #sidebar {
      position: fixed;
      top: 20px;
      left: 20px;
      bottom: 20px;
      width: var(--sidebar-w);
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 12px;
      pointer-events: none;
    }
    #sidebar > * { pointer-events: all; }

    .panel-header {
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 20px 22px 18px;
      position: relative;
      overflow: hidden;
    }
    .panel-header::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent-3), var(--accent-2));
    }
    .panel-header .logo-tag {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 3px;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .panel-header h1 {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 800;
      line-height: 1.15;
      letter-spacing: -0.5px;
      color: var(--text-primary);
    }
    .panel-header h1 span { color: var(--accent); }
    .panel-header .subtitle {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 5px;
      letter-spacing: 0.5px;
    }

    .stats-row { display: flex; gap: 8px; margin-top: 12px; }
    .stat-chip {
      flex: 1;
      background: rgba(0,229,176,0.07);
      border: 1px solid rgba(0,229,176,0.15);
      border-radius: 8px;
      padding: 7px 10px;
      text-align: center;
    }
    .stat-chip .val {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
      display: block;
    }
    .stat-chip .lbl { font-size: 8px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; }

    .panel-control {
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 14px 16px;
    }
    .panel-control .ctrl-label {
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .basemap-btns { display: flex; gap: 8px; }
    .basemap-btn {
      flex: 1;
      padding: 8px 6px;
      border-radius: 8px;
      border: 1px solid var(--glass-border);
      background: rgba(255,255,255,0.03);
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 10px;
      cursor: pointer;
      transition: all 0.22s ease;
      text-align: center;
    }
    .basemap-btn:hover { border-color: var(--accent); color: var(--text-primary); }
    .basemap-btn.active {
      background: rgba(0,229,176,0.12);
      border-color: var(--accent);
      color: var(--accent);
    }

    .filter-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .filter-tag {
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--glass-border);
      background: rgba(255,255,255,0.03);
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 10px;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
    }
    .filter-tag:hover { border-color: var(--accent); color: var(--text-primary); }
    .filter-tag.active {
      background: rgba(0,229,176,0.15);
      border-color: var(--accent);
      color: var(--accent);
    }
    
    .filter-tag[data-cat="Bukit"].active    { background: rgba(167,139,250,0.15); border-color: var(--accent-3); color: var(--accent-3); }
    .filter-tag[data-cat="Danau"].active    { background: rgba(0,180,255,0.15);  border-color: #00b4ff;          color: #00b4ff; }
    .filter-tag[data-cat="Bentang Alam"].active { background: rgba(255,107,53,0.15); border-color: var(--accent-2); color: var(--accent-2); }
    .filter-tag[data-cat="Gua"].active      { background: rgba(255,200,50,0.15);  border-color: #ffc832;          color: #ffc832; }
    .filter-tag[data-cat="Pantai"].active   { background: rgba(0,229,176,0.15);   border-color: var(--accent);    color: var(--accent); }
    .filter-tag[data-cat="Embung"].active   { background: rgba(14,165,233,0.15);  border-color: #0ea5e9;          color: #0ea5e9; }

    #location-list-panel {
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      overflow: hidden;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .list-header {
      padding: 12px 16px 10px;
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .list-header .title { font-size: 9px; letter-spacing: 2px; color: var(--text-muted); text-transform: uppercase; }
    .list-header .count {
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      background: rgba(0,229,176,0.1);
      padding: 2px 8px;
      border-radius: 10px;
    }
    #location-list {
      overflow-y: auto;
      flex: 1;
      padding: 8px;
      scrollbar-width: thin;
      scrollbar-color: var(--accent) transparent;
    }
    #location-list::-webkit-scrollbar { width: 4px; }
    #location-list::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }

    .loc-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-bottom: 4px;
    }
    .loc-item:hover { background: rgba(0,229,176,0.07); border-color: var(--glass-border); }
    .loc-item.active { background: rgba(0,229,176,0.12); border-color: var(--accent); }

    .loc-icon {
      width: 36px; height: 36px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
    }
    .loc-info { flex: 1; min-width: 0; }
    .loc-name {
      font-family: var(--font-display);
      font-size: 12px;
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .loc-meta {
      font-size: 9px;
      color: var(--text-muted);
      margin-top: 2px;
      display: flex;
      gap: 6px;
    }
    .loc-cat {
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .loc-acc { color: var(--text-muted); }
    .loc-arrow { color: var(--text-muted); font-size: 10px; flex-shrink: 0; }
    .loc-item.active .loc-arrow { color: var(--accent); }

    #coords-hud {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 100;
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      padding: 8px 14px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      pointer-events: none;
    }
    #coords-hud span { color: var(--accent); }

    .leaflet-popup-content-wrapper {
      background: transparent !important;
      box-shadow: none !important;
      padding: 0 !important;
      border-radius: var(--radius) !important;
    }
    .leaflet-popup-tip-container { display: none; }
    .leaflet-popup-close-button {
      color: var(--text-muted) !important;
      font-size: 18px !important;
      top: 10px !important;
      right: 12px !important;
      z-index: 10;
    }
    .leaflet-popup-close-button:hover { color: var(--accent) !important; }

    .geo-popup {
      width: 280px;
      background: rgba(8, 14, 24, 0.92);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      overflow: hidden;
      font-family: var(--font-mono);
    }
    .geo-popup .popup-img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      display: block;
    }
    .geo-popup .popup-img-wrap { position: relative; }
    .geo-popup .popup-img-wrap::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 60px;
      background: linear-gradient(transparent, rgba(8,14,24,0.9));
    }
    .geo-popup .popup-cat-badge {
      position: absolute;
      top: 10px; left: 10px;
      padding: 3px 10px;
      border-radius: 4px;
      font-size: 9px;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-weight: 700;
      z-index: 2;
    }
    .geo-popup .popup-body { padding: 14px 16px; }
    .geo-popup .popup-name {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.2;
      margin-bottom: 6px;
    }
    .geo-popup .popup-desc {
      font-size: 10px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 12px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .geo-popup .popup-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid var(--glass-border);
      padding-top: 10px;
    }
    .geo-popup .detail-btn {
      padding: 6px 14px;
      border-radius: 6px;
      background: rgba(0,229,176,0.12);
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: var(--font-mono);
      font-size: 10px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.5px;
    }
    .geo-popup .detail-btn:hover { background: var(--accent); color: #060b14; }

    .geo-marker {
      width: 32px; height: 32px;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      display: flex; align-items: center; justify-content: center;
      border: 2px solid rgba(255,255,255,0.3);
      box-shadow: 0 4px 14px rgba(0,0,0,0.5);
      transition: transform 0.2s;
    }
    .geo-marker:hover { transform: rotate(-45deg) scale(1.15); }
    .geo-marker .inner { transform: rotate(45deg); font-size: 14px; }

    @keyframes pulse-ring {
      0%   { transform: scale(0.8); opacity: 0.8; }
      100% { transform: scale(2.2); opacity: 0; }
    }
    .geo-marker.pulse::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50% 50% 50% 0;
      border: 2px solid var(--accent);
      animation: pulse-ring 1.4s ease-out infinite;
    }

    #loading {
      position: fixed;
      inset: 0;
      background: #060b14;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.6s ease;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .loader-logo { font-family: var(--font-display); font-size: 28px; font-weight: 800; color: var(--text-primary); margin-bottom: 6px; }
    .loader-logo span { color: var(--accent); }
    .loader-sub { font-size: 10px; color: var(--text-muted); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 30px; }
    .loader-bar { width: 180px; height: 2px; background: rgba(255,255,255,0.05); border-radius: 2px; overflow: hidden; }
    @keyframes load-anim { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
    .loader-bar-fill { height: 100%; width: 100%; background: linear-gradient(90deg, transparent, var(--accent), transparent); animation: load-anim 1.2s ease infinite; }

    #detail-modal {
      position: fixed;
      inset: 0;
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(6, 11, 20, 0.7);
      backdrop-filter: blur(6px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    #detail-modal.show { opacity: 1; pointer-events: all; }
    .modal-card {
      width: 460px;
      max-width: 90vw;
      background: rgba(10, 16, 28, 0.95);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      overflow: hidden;
      transform: translateY(20px);
      transition: transform 0.3s ease;
      font-family: var(--font-mono);
      max-height: 90vh;
      overflow-y: auto;
    }
    #detail-modal.show .modal-card { transform: translateY(0); }
    .modal-img {
      width: 100%; height: 200px;
      object-fit: cover;
      display: block;
    }
    .modal-body { padding: 20px 24px 24px; }
    .modal-cat { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); margin-bottom: 6px; }
    .modal-name { font-family: var(--font-display); font-size: 22px; font-weight: 800; color: var(--text-primary); margin-bottom: 10px; line-height: 1.2; }
    .modal-desc { font-size: 11px; color: var(--text-muted); line-height: 1.8; margin-bottom: 16px; }
    .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; }
    .modal-field label { font-size: 8px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); display: block; margin-bottom: 3px; }
    .modal-field .val { font-size: 12px; color: var(--text-primary); word-break: break-word; }
    .modal-close-btn {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      background: rgba(0,229,176,0.08);
      border: 1px solid var(--glass-border);
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .modal-close-btn:hover { border-color: var(--accent); color: var(--accent); }

    @media (max-width: 768px) {
      :root { --sidebar-w: calc(100vw - 32px); }
      #sidebar { top: auto; bottom: 16px; left: 16px; right: 16px; max-height: 45vh; }
      #coords-hud { display: none; }
      .leaflet-control-zoom { display: none !important; }
    }
  </style>
</head>
<body>

<div id="loading">
  <div class="loader-logo">Sabu<span>Raijua</span></div>
  <div class="loader-sub">Ekspedisi Geologi 2024</div>
  <div class="loader-bar"><div class="loader-bar-fill"></div></div>
</div>

<div id="map"></div>

<div id="coords-hud">
  LAT: <span id="hud-lat">–––</span> &nbsp; LON: <span id="hud-lng">–––</span>
</div>

<div id="sidebar">
  <div class="panel-header">
    <div class="logo-tag">⬡ Web-GIS · Ekspedisi 2024</div>
    <h1>Geo<span>Wisata</span><br>Sabu-Raijua</h1>
    <div class="subtitle">Pemetaan Potensi Geologi Pulau Sabu & Raijua</div>
    <div class="stats-row">
      <div class="stat-chip">
        <span class="val" id="stat-total">0</span>
        <span class="lbl">Situs</span>
      </div>
      <div class="stat-chip">
        <span class="val" id="stat-visible">0</span>
        <span class="lbl">Tampil</span>
      </div>
      <div class="stat-chip">
        <span class="val" id="stat-cats">0</span>
        <span class="lbl">Kategori</span>
      </div>
    </div>
  </div>

  <div class="panel-control">
    <div class="ctrl-label">🗺 Basemap</div>
    <div class="basemap-btns">
      <button class="basemap-btn active" id="btn-dark" onclick="switchBasemap('dark')">🌑 Dark</button>
      <button class="basemap-btn" id="btn-satellite" onclick="switchBasemap('satellite')">🛰 Satellite</button>
    </div>
  </div>

  <div class="panel-control">
    <div class="ctrl-label">🔍 Filter Kategori</div>
    <div class="filter-tags" id="filter-tags">
      <span class="filter-tag active" data-cat="ALL" onclick="applyFilter(this, 'ALL')">Semua</span>
    </div>
  </div>

  <div id="location-list-panel">
    <div class="list-header">
      <span class="title">📍 Daftar Lokasi (31 Situs)</span>
      <span class="count" id="list-count">0</span>
    </div>
    <div id="location-list"></div>
  </div>
</div>

<div id="detail-modal" onclick="closeModalBg(event)">
  <div class="modal-card">
    <img class="modal-img" id="modal-img" src="" alt="" />
    <div class="modal-body">
      <div class="modal-cat" id="modal-cat"></div>
      <div class="modal-name" id="modal-name"></div>
      <div class="modal-desc" id="modal-desc"></div>
      <div class="modal-grid">
        <div class="modal-field">
          <label>Aksesibilitas</label>
          <div class="val" id="modal-acc"></div>
        </div>
        <div class="modal-field">
          <label>Koordinat</label>
          <div class="val" id="modal-coords" style="font-size: 10px;"></div>
        </div>
        <div class="modal-field">
          <label>Formasi Geologi</label>
          <div class="val" id="modal-geo" style="font-size: 10px;"></div>
        </div>
        <div class="modal-field">
          <label>Kondisi & Bahaya</label>
          <div class="val" id="modal-kondisi" style="font-size: 10px;"></div>
        </div>
      </div>
      <button class="modal-close-btn" onclick="closeModal()">✕ Tutup</button>
    </div>
  </div>
</div>

<script>
const CONFIG = {
  centerLat:  -10.5500,
  centerLng:  121.8500,
  zoomInit:   11,       
  zoomFlyTo:  14
};

// DATA GEOJSON dari Ekspedisi Sabu-Raijua 2024
const SAMPLE_GEOJSON = {
  "type": "FeatureCollection",
  "features": [

  "Bukit":       { color: "#a78bfa", emoji: "⛰️", bg: "rgba(167,139,250,0.2)" },
  "Danau":       { color: "#00b4ff", emoji: "💧", bg: "rgba(0,180,255,0.2)"   },

  "Embung":      { color: "#0ea5e9", emoji: "🏞️", bg: "rgba(14,165,233,0.2)"   },
  "DEFAULT":     { color: "#e8f4f0", emoji: "📍", bg: "rgba(232,244,240,0.2)" },
};

const ACC_LEVEL = { "Mudah": 3, "Sedang": 2, "Sulit": 1 };

let map, layerGroup;
let allFeatures = [];
let currentBasemapStr = "dark";
let markersDict = {};

const BASEMAPS = {
  dark: L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
    attribution: '© <a href="https://carto.com/">CARTO</a>',
    maxZoom: 19,
    subdomains: "abcd"
  }),
  satellite: L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}", {
    attribution: 'Tiles © Esri',
    maxZoom: 19
  })
};

function initMap() {
  map = L.map('map', {
    zoomControl: false,
    minZoom: 6,
    maxZoom: 18
  }).setView([CONFIG.centerLat, CONFIG.centerLng], CONFIG.zoomInit);

  L.control.zoom({ position: 'bottomright' }).addTo(map);
  BASEMAPS[currentBasemapStr].addTo(map);
  layerGroup = L.layerGroup().addTo(map);

  map.on('mousemove', function(e) {
    document.getElementById('hud-lat').innerText = e.latlng.lat.toFixed(5);
    document.getElementById('hud-lng').innerText = e.latlng.lng.toFixed(5);
  });

  loadData();
}

function loadData() {
  setTimeout(() => {
    allFeatures = SAMPLE_GEOJSON.features;
    renderCategories();
    renderMarkers("ALL");
    
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('stat-total').innerText = allFeatures.length;
  }, 800);
}

function renderCategories() {
  const categories = new Set(allFeatures.map(f => f.properties.kategori));
  const filterContainer = document.getElementById('filter-tags');
  
  document.getElementById('stat-cats').innerText = categories.size;

  categories.forEach(cat => {
    const span = document.createElement('span');
    span.className = 'filter-tag';
    span.setAttribute('data-cat', cat);
    span.innerText = cat;
    span.onclick = function() { applyFilter(this, cat); };
    filterContainer.appendChild(span);
  });
}

function applyFilter(element, category) {
  document.querySelectorAll('.filter-tag').forEach(el => el.classList.remove('active'));
  element.classList.add('active');
  renderMarkers(category);
}

function renderMarkers(filterCat) {
  layerGroup.clearLayers();
  markersDict = {};
  
  const listContainer = document.getElementById('location-list');
  listContainer.innerHTML = '';
  
  let visibleCount = 0;

  allFeatures.forEach(feature => {
    const props = feature.properties;
    if (filterCat !== "ALL" && props.kategori !== filterCat) return;
    
    visibleCount++;
    const [lng, lat] = feature.geometry.coordinates;
    const catConf = CATEGORY_CONFIG[props.kategori] || CATEGORY_CONFIG["DEFAULT"];

    const iconHtml = `
      <div class="geo-marker pulse" style="background: ${catConf.bg}; border-color: ${catConf.color}">
        <div class="inner">${catConf.emoji}</div>
      </div>
    `;
    const customIcon = L.divIcon({
      className: 'custom-div-icon',
      html: iconHtml,
      iconSize: [32, 32],
      iconAnchor: [16, 32],
      popupAnchor: [0, -32]
    });

    const marker = L.marker([lat, lng], { icon: customIcon }).addTo(layerGroup);
    
    const accLevel = ACC_LEVEL[props.aksesibilitas] || 0;
    let dots = '';
    for(let i=0; i<3; i++) {
      dots += `<div class="acc-dot" style="width:7px;height:7px;border-radius:50%;background:${i < accLevel ? catConf.color : 'rgba(255,255,255,0.1)'}"></div>`;
    }

    const popupHtml = `
      <div class="geo-popup">
        <div class="popup-img-wrap">
          <span class="popup-cat-badge" style="background:${catConf.color}; color:#060b14">${props.kategori}</span>
          <img src="${props.image_url}" class="popup-img" alt="${props.nama_situs}">
        </div>
        <div class="popup-body">
          <div class="popup-name">${props.nama_situs}</div>
          <div class="popup-desc">${props.deskripsi_geologi}</div>
          
          <div class="popup-footer" style="display:flex; gap:8px;">
            <div style="display:flex; gap:4px;">
              ${dots} <span style="font-size:9px;color:var(--text-muted);margin-left:4px">${props.aksesibilitas}</span>
            </div>
            <button class="detail-btn" onclick='openModalById(${props.id})'>Detail</button>
          </div>
        </div>
      </div>
    `;
    marker.bindPopup(popupHtml);
    markersDict[props.id] = { marker, props, lat, lng };

    const listItem = document.createElement('div');
    listItem.className = 'loc-item';
    listItem.innerHTML = `
      <div class="loc-icon" style="background:${catConf.bg}; color:${catConf.color}; border: 1px solid ${catConf.color}">
        ${catConf.emoji}
      </div>
      <div class="loc-info">
        <div class="loc-name">${props.nama_situs}</div>
        <div class="loc-meta">
          <span class="loc-cat" style="background:${catConf.bg}; color:${catConf.color}">${props.kategori}</span>
          <span class="loc-acc">• ${props.aksesibilitas}</span>
        </div>
      </div>
      <div class="loc-arrow">▶</div>
    `;
    
    listItem.onclick = () => {
      map.flyTo([lat, lng], CONFIG.zoomFlyTo, { duration: 1.5 });
      marker.openPopup();
      
      document.querySelectorAll('.loc-item').forEach(el => el.classList.remove('active'));
      listItem.classList.add('active');
    };
    
    listContainer.appendChild(listItem);
  });

  document.getElementById('stat-visible').innerText = visibleCount;
  document.getElementById('list-count').innerText = visibleCount;
}

function switchBasemap(type) {
  if (type === currentBasemapStr) return;
  
  map.removeLayer(BASEMAPS[currentBasemapStr]);
  BASEMAPS[type].addTo(map);
  
  currentBasemapStr = type;

  document.getElementById('btn-dark').classList.remove('active');
  document.getElementById('btn-satellite').classList.remove('active');
  document.getElementById(`btn-${type}`).classList.add('active');
}

window.openModalById = function(id) {
  const data = markersDict[id];
  if(!data) return;
  
  const props = data.props;
  const lat = data.lat.toFixed(5);
  const lng = data.lng.toFixed(5);
  
  document.getElementById('modal-img').src = props.image_url;
  document.getElementById('modal-cat').innerText = props.kategori;
  document.getElementById('modal-name').innerText = props.nama_situs;
  document.getElementById('modal-desc').innerText = props.deskripsi_geologi;
  document.getElementById('modal-acc').innerText = props.aksesibilitas;
  document.getElementById('modal-coords').innerText = `${lat}, ${lng}`;
  document.getElementById('modal-geo').innerText = props.formasi || '-';
  document.getElementById('modal-kondisi').innerText = props.kondisi || '-';
  
  document.getElementById('detail-modal').classList.add('show');
}

window.closeModalBg = function(e) {
  if(e.target.id === 'detail-modal') {
    closeModal();
  }
}

window.closeModal = function() {
  document.getElementById('detail-modal').classList.remove('show');
}

window.onload = initMap;
</script>
</body>
</html>
